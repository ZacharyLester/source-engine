name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-android-armv7a:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install build dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y \
          build-essential gcc-multilib g++-multilib \
          libsdl2-dev:i386 libfreetype6-dev:i386 \
          libfontconfig1-dev:i386 libopenal-dev:i386 \
          libjpeg-dev:i386 libpng-dev:i386 \
          libcurl4-openssl-dev:i386 libbz2-dev:i386 \
          libedit-dev:i386

    - name: Download NDK r10e
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip
        unzip -q android-ndk-r10e-linux-x86_64.zip -d $HOME
        echo "ANDROID_NDK_HOME=$HOME/android-ndk-r10e" >> $GITHUB_ENV

    - name: Download Clang 11
      run: |
        wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-11.1.0/clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-16.04.tar.xz
        tar -xf clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-16.04.tar.xz -C $HOME
        echo "$HOME/clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-16.04/bin" >> $GITHUB_PATH

    - name: Configure
      run: python3 ./waf configure -T release --build-games=cstrike --togles --android=armeabi-v7a-hard,host,21

    - name: Build
      run: python3 ./waf install --strip -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: source-engine-android
        path: build/